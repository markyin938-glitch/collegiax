<!DOCTYPE html>
<html>
<head><title>Password Hasher</title></head>
<body>
  <h2>Generate Bcrypt Hash</h2>
  <input type="text" id="pwd" placeholder="Enter password" />
  <button onclick="hash()">Generate Hash</button>
  <pre id="out"></pre>
  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
  <script>
    function hash() {
      const pwd = document.getElementById('pwd').value;
      const salt = dcodeIO.bcrypt.genSaltSync(12);
      const hash = dcodeIO.bcrypt.hashSync(pwd, salt);
      document.getElementById('out').textContent = hash;
    }
  </script>
</body>
</html>
